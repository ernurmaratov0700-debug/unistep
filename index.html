<script>
let subjects = [];

function convertToGPA(grade) {
    if (grade >= 95) return 4.0;     // A
    if (grade >= 90) return 3.7;     // A-
    if (grade >= 85) return 3.3;     // B+
    if (grade >= 80) return 3.0;     // B
    if (grade >= 75) return 2.7;     // B-
    if (grade >= 70) return 2.3;     // C+
    if (grade >= 65) return 2.0;     // C
    if (grade >= 60) return 1.7;     // C-
    if (grade >= 55) return 1.3;     // D+
    if (grade >= 50) return 1.0;     // D
    return 0;                        // F
}

function addSubject() {
    let grade = parseFloat(document.getElementById("grade").value);
    let credit = parseFloat(document.getElementById("credit").value);

    if (isNaN(grade) || isNaN(credit)) {
        alert("Мәлімет енгізіңіз!");
        return;
    }

    let gpa = convertToGPA(grade);

    subjects.push({ grade, credit, gpa });

    let li = document.createElement("li");
    li.innerText = `Баға: ${grade} → GPA: ${gpa} | Кредит: ${credit}`;
    document.getElementById("subjects").appendChild(li);

    document.getElementById("grade").value = "";
    document.getElementById("credit").value = "";
}

function calculateGPA() {
    if (subjects.length === 0) {
        document.getElementById("result").innerText = "Пән қосыңыз!";
        return;
    }

    let totalPoints = 0;
    let totalCredits = 0;

    subjects.forEach(sub => {
        totalPoints += sub.gpa * sub.credit;
        totalCredits += sub.credit;
    });

    let finalGPA = totalPoints / totalCredits;

    document.getElementById("result").innerText =
        "Жалпы GPA: " + finalGPA.toFixed(2);
}
</script>
