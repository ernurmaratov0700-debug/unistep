<!DOCTYPE html>
<html lang="kk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UniStep Platform</title>
<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f4f6f9;
}

.sidebar {
    width: 240px;
    height: 100vh;
    background: #2563EB;
    color: white;
    position: fixed;
    padding: 20px;
}

.sidebar h2 {
    margin-bottom: 30px;
}

.sidebar a {
    display: block;
    color: white;
    text-decoration: none;
    margin: 15px 0;
}

.main {
    margin-left: 260px;
    padding: 30px;
}

.card {
    background: white;
    padding: 20px;
    border-radius: 10px;
    margin-bottom: 20px;
    box-shadow: 0 3px 8px rgba(0,0,0,0.05);
}

button {
    background: #2563EB;
    color: white;
    border: none;
    padding: 10px 15px;
    border-radius: 6px;
    cursor: pointer;
}

input {
    padding: 8px;
    margin: 5px;
}
</style>
</head>
<body>

<div class="sidebar">
    <h2>🎓 UniStep</h2>
    <a href="#">Dashboard</a>
    <a href="#">Сабақ кестесі</a>
    <a href="#">GPA калькулятор</a>
    <a href="#">Дедлайн</a>
    <a href="#">Survival Guide</a>
</div>

<div class="main">
    <h1>Қош келдің!</h1>

    <div class="card">
        <h3>📅 Келесі сабақ</h3>
        <p>Математика — 302 аудитория — 15:00</p>
    </div>

    <div class="card">
        <h3>📊 GPA Калькулятор</h3>
        <input type="number" id="grade" placeholder="Баға (0-100)">
        <input type="number" id="credit" placeholder="Кредит">
        <button onclick="calculateGPA()">Есептеу</button>
        <p id="result"></p>
    </div>

    <div class="card">
        <h3>⏰ Дедлайн</h3>
        <p>Физика СӨЖ — 2 күн қалды</p>
    </div>

</div>

<script>
function calculateGPA() {
    let grade = document.getElementById("grade").value;
    let credit = document.getElementById("credit").value;

    if(grade && credit) {
        let gpa = (grade / 25) * credit;
        document.getElementById("result").innerText = 
        "Болжалды GPA ұпайы: " + gpa.toFixed(2);
    } else {
        document.getElementById("result").innerText = 
        "Мәлімет енгізіңіз!";
    }
}
</script>

</body>
</html>
